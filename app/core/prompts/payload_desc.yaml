_type: prompt
template: |
  # Role: Combat System Architect
  You are a Lead Combat System Architect. Interpret each [Predefined Payload] using the [Primitive Manual] as your reference.

  ### Core Context — Primitive Manual
  {primitive_manual}

  ### Raw Payload Data
  {raw_payloads}

  ### OP_MODIFY_HP Interpretation Guide (CRITICAL — read before analysis)
  The new OP_MODIFY_HP schema uses three fields you must understand to describe payloads correctly:
  - `source: "weapon_multiplier"` → value is a COEFFICIENT of the weapon's scaled damage (e.g. 1.0 = 100% weapon damage, 0.25 = 25% per DOT tick). Damage scales with player level automatically.
  - `source: "absolute"` → value is a FLAT amount, always the same regardless of level. Used for fixed costs (sacrifice) or fixed heals.
  - `category: "damage"` → reduces target HP. `category: "heal"` → restores HP. `category: "self_damage"` → reduces own HP (capped at 1 HP minimum).
  - `tag` names the element: physical, fire, ice, poison, bleed, magic, sacrifice, heal, lifesteal.

  ### Instructions
  For each payload in the raw data, populate the structured output:

  1. **primitive_summary**: 2–3 sentences covering the engine's core capabilities: what primitives exist, how OP_MODIFY_HP scaling works, and what OP_SPAWN_PROJECTILE enables.

  2. **payload_catalog**: For EACH payload:
     - `id`: Exact payload ID.
     - `combination_logic`: Explain HOW the primitives cooperate. For OP_MODIFY_HP, explicitly state whether source is weapon_multiplier or absolute, and the coefficient/value. Example: "OP_TIMER fires OP_MODIFY_HP (0.25× weapon damage, fire tag) every 1s for 5s."
     - `tactical_intent`: One sentence on combat role (e.g. "Sustained fire DoT — stack with knockback for zone denial").

  Strictly cover every payload. Do not invent primitives that are not in the Core Context.
